name: Build AutoLoot Mace

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Клонировать репозиторий
        uses: actions/checkout@v4

      - name: Установить JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Скачать gradle-wrapper.jar
        run: |
          mkdir -p gradle/wrapper
          curl -sL https://github.com/gradle/gradle/raw/v8.8.0/gradle/wrapper/gradle-wrapper.jar \
            -o gradle/wrapper/gradle-wrapper.jar

      - name: Дать права на выполнение gradlew
        run: chmod +x gradlew

      - name: Кэшировать Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Собрать мод
        run: ./gradlew build --no-daemon

      - name: Загрузить .jar
        uses: actions/upload-artifact@v4
        with:
          name: autoloot-mace-mod
          path: build/libs/autoloot-mace-*.jar
          if-no-files-found: errorname: Build AutoLoot Mace

